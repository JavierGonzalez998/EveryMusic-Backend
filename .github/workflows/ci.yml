name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      # Tests run on in-memory SQLite with mocked storage — no secrets needed.
      # `python -m` puts the repo root on sys.path so `controller` imports.
      - run: python -m pytest -q
